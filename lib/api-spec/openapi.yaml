openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Meu Clube - Plataforma multiempresa para gestão de clubes e condomínios
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: companies
    description: Company management
  - name: users
    description: User management
  - name: structures
    description: Bookable structures
  - name: reservations
    description: Reservation management
  - name: plans
    description: Plans and subscriptions
  - name: dashboard
    description: Dashboard summaries

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Auth ──────────────────────────────────────────────────────────────────
  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with phone and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: Authenticated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthSession"
        "401":
          description: Invalid credentials

  /auth/password:
    patch:
      operationId: changePassword
      tags: [auth]
      summary: Change current user's password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password changed
        "400":
          description: Wrong current password or invalid input

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Me"
        "401":
          description: Not authenticated

  # ── Companies ──────────────────────────────────────────────────────────────
  /companies:
    get:
      operationId: listCompanies
      tags: [companies]
      summary: List all companies (super admin)
      responses:
        "200":
          description: List of companies
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Company"
    post:
      operationId: createCompany
      tags: [companies]
      summary: Create a new company
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{companyId}:
    get:
      operationId: getCompany
      tags: [companies]
      summary: Get company by ID
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Company
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"
    patch:
      operationId: updateCompany
      tags: [companies]
      summary: Update company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{companyId}/status:
    patch:
      operationId: updateCompanyStatus
      tags: [companies]
      summary: Change company status (activate, suspend, cancel)
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  # ── Company Users ──────────────────────────────────────────────────────────
  /companies/{companyId}/users:
    get:
      operationId: listCompanyUsers
      tags: [users]
      summary: List users linked to a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of company users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CompanyUser"
    post:
      operationId: addCompanyUser
      tags: [users]
      summary: Add or invite a user to a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyUser"

  /companies/{companyId}/users/{userId}/reset-password:
    post:
      operationId: resetCompanyUserPassword
      tags: [users]
      summary: Reset a company user's password (super admin only)
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  /companies/{companyId}/responsible:
    patch:
      operationId: setCompanyResponsible
      tags: [companies]
      summary: Set the responsible user for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SetResponsibleInput"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Company"

  /companies/{companyId}/users/{userId}:
    patch:
      operationId: updateCompanyUser
      tags: [users]
      summary: Update user role or status in a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CompanyUserUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyUser"
    delete:
      operationId: removeCompanyUser
      tags: [users]
      summary: Remove user from a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Removed

  # ── Structures ─────────────────────────────────────────────────────────────
  /companies/{companyId}/structures:
    get:
      operationId: listStructures
      tags: [structures]
      summary: List bookable structures for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of structures
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Structure"
    post:
      operationId: createStructure
      tags: [structures]
      summary: Create a bookable structure
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StructureInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Structure"

  /companies/{companyId}/structures/{structureId}:
    get:
      operationId: getStructure
      tags: [structures]
      summary: Get a structure
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: structureId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Structure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Structure"
    patch:
      operationId: updateStructure
      tags: [structures]
      summary: Update a structure
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: structureId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StructureUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Structure"
    delete:
      operationId: deleteStructure
      tags: [structures]
      summary: Remove a structure
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: structureId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Reservations ───────────────────────────────────────────────────────────
  /companies/{companyId}/reservations:
    get:
      operationId: listReservations
      tags: [reservations]
      summary: List reservations for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of reservations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Reservation"
    post:
      operationId: createReservation
      tags: [reservations]
      summary: Create a reservation
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"
        "409":
          description: Conflict - time slot already booked

  /companies/{companyId}/reservations/{reservationId}:
    get:
      operationId: getReservation
      tags: [reservations]
      summary: Get reservation details
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reservation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  /companies/{companyId}/reservations/{reservationId}/status:
    patch:
      operationId: updateReservationStatus
      tags: [reservations]
      summary: Confirm, cancel or reject a reservation
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
        - name: reservationId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReservationStatusUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Reservation"

  # ── Dashboard ──────────────────────────────────────────────────────────────
  /companies/{companyId}/dashboard:
    get:
      operationId: getCompanyDashboard
      tags: [dashboard]
      summary: Get dashboard summary for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Dashboard data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CompanyDashboard"

  # ── Admin Users ─────────────────────────────────────────────────────────────
  /users:
    get:
      operationId: listAdminUsers
      tags: [users]
      summary: List all super admin users
      responses:
        "200":
          description: Super admin users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/AdminUser"
    post:
      operationId: createAdminUser
      tags: [users]
      summary: Create a new super admin user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAdminUserInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminUser"
        "409":
          description: Phone already in use

  /users/{userId}:
    delete:
      operationId: deleteAdminUser
      tags: [users]
      summary: Delete a super admin user
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  # ── Plans ──────────────────────────────────────────────────────────────────
  /plans:
    get:
      operationId: listPlans
      tags: [plans]
      summary: List all commercial plans
      responses:
        "200":
          description: Plans
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Plan"
    post:
      operationId: createPlan
      tags: [plans]
      summary: Create a commercial plan (super admin)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PlanInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Plan"

  /companies/{companyId}/subscription:
    get:
      operationId: getCompanySubscription
      tags: [plans]
      summary: Get subscription for a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
    post:
      operationId: setCompanySubscription
      tags: [plans]
      summary: Assign a plan to a company
      parameters:
        - name: companyId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SubscriptionInput"
      responses:
        "200":
          description: Subscription
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"

components:
  schemas:
    AdminUser:
      type: object
      required: [id, name, phone, role, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: string
          nullable: true
        role:
          type: string
        createdAt:
          type: string

    CreateAdminUserInput:
      type: object
      required: [name, phone, password]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        password:
          type: string
          minLength: 6

    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    # ── Auth ────────────────────────────────────────────────────────────────
    LoginInput:
      type: object
      required: [phone, password]
      properties:
        phone:
          type: string
        password:
          type: string

    AuthSession:
      type: object
      required: [id, name, phone, role]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        role:
          type: string
          description: "Global role: super_admin or user"
        companyId:
          type: ["integer", "null"]
          description: Active company context

    Me:
      type: object
      required: [id, name, phone, role]
      properties:
        id:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
        companyId:
          type: ["integer", "null"]
        companyRole:
          type: ["string", "null"]
          description: "Role within active company: admin, operator or member"

    # ── Companies ────────────────────────────────────────────────────────────
    Company:
      type: object
      required: [id, name, type, status, createdAt]
      properties:
        id:
          type: integer
        name:
          type: string
        type:
          type: string
          description: "club, condominium or other"
        status:
          type: string
          description: "active, inactive, suspended, cancelled"
        email:
          type: ["string", "null"]
        phone:
          type: ["string", "null"]
        address:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        planId:
          type: ["integer", "null"]
        responsibleUserId:
          type: ["integer", "null"]
          description: "ID of the responsible user for this company"

    ChangePasswordInput:
      type: object
      required: [currentPassword, newPassword]
      properties:
        currentPassword:
          type: string
        newPassword:
          type: string

    ResetPasswordInput:
      type: object
      required: [newPassword]
      properties:
        newPassword:
          type: string
          minLength: 6
          description: "New password to set for the user"

    SetResponsibleInput:
      type: object
      required: [userId]
      properties:
        userId:
          type: integer
          description: "ID of the user to set as responsible"

    CompanyInput:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
        type:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string
        adminName:
          type: string
          description: "Name of the initial admin user"
        adminPhone:
          type: string
          description: "Phone (login) of the initial admin user"
        adminPassword:
          type: string
          description: "Password for the initial admin user"

    CompanyUpdate:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        phone:
          type: string
        address:
          type: string

    CompanyStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: "active, inactive, suspended, cancelled"

    # ── Users ────────────────────────────────────────────────────────────────
    CompanyUser:
      type: object
      required: [id, userId, companyId, role, status, name, phone]
      properties:
        id:
          type: integer
        userId:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        phone:
          type: string
        email:
          type: ["string", "null"]
        role:
          type: string
          description: "admin, operator, member"
        status:
          type: string
          description: "active, inactive"
        createdAt:
          type: string
          format: date-time

    CompanyUserInput:
      type: object
      required: [name, phone, role]
      properties:
        name:
          type: string
        phone:
          type: string
        email:
          type: string
        password:
          type: string
        role:
          type: string
          description: "admin, operator, member"

    CompanyUserUpdate:
      type: object
      properties:
        role:
          type: string
        status:
          type: string

    # ── Structures ────────────────────────────────────────────────────────────
    Structure:
      type: object
      required: [id, companyId, name, type, status, capacity]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        name:
          type: string
        type:
          type: string
          description: "court, pool, room, field, gym, other"
        description:
          type: ["string", "null"]
        capacity:
          type: integer
        status:
          type: string
          description: "active, inactive, maintenance"
        openTime:
          type: ["string", "null"]
          description: "HH:MM format"
        closeTime:
          type: ["string", "null"]
          description: "HH:MM format"
        maxDurationMinutes:
          type: ["integer", "null"]
        requiresApproval:
          type: boolean
        createdAt:
          type: string
          format: date-time

    StructureInput:
      type: object
      required: [name, type, capacity]
      properties:
        name:
          type: string
        type:
          type: string
        description:
          type: string
        capacity:
          type: integer
        openTime:
          type: string
        closeTime:
          type: string
        maxDurationMinutes:
          type: integer
        requiresApproval:
          type: boolean

    StructureUpdate:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        capacity:
          type: integer
        status:
          type: string
        openTime:
          type: string
        closeTime:
          type: string
        maxDurationMinutes:
          type: integer
        requiresApproval:
          type: boolean

    # ── Reservations ──────────────────────────────────────────────────────────
    Reservation:
      type: object
      required: [id, companyId, structureId, userId, date, startTime, endTime, status, createdAt]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        structureId:
          type: integer
        structureName:
          type: string
        userId:
          type: integer
        userName:
          type: string
        date:
          type: string
          format: date
        startTime:
          type: string
          description: "HH:MM"
        endTime:
          type: string
          description: "HH:MM"
        status:
          type: string
          description: "requested, confirmed, cancelled, rejected, completed"
        notes:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time

    ReservationInput:
      type: object
      required: [structureId, date, startTime, endTime]
      properties:
        structureId:
          type: integer
        date:
          type: string
          format: date
        startTime:
          type: string
        endTime:
          type: string
        notes:
          type: string

    ReservationStatusUpdate:
      type: object
      required: [status]
      properties:
        status:
          type: string
          description: "confirmed, cancelled, rejected, completed"
        reason:
          type: string

    # ── Dashboard ─────────────────────────────────────────────────────────────
    CompanyDashboard:
      type: object
      required: [totalUsers, totalStructures, totalReservations, reservationsByStatus, upcomingReservations]
      properties:
        totalUsers:
          type: integer
        totalStructures:
          type: integer
        totalReservations:
          type: integer
        reservationsByStatus:
          type: array
          items:
            $ref: "#/components/schemas/StatusCount"
        upcomingReservations:
          type: array
          items:
            $ref: "#/components/schemas/Reservation"
        reservationsThisWeek:
          type: integer
        activeStructures:
          type: integer

    StatusCount:
      type: object
      required: [status, count]
      properties:
        status:
          type: string
        count:
          type: integer

    # ── Plans ─────────────────────────────────────────────────────────────────
    Plan:
      type: object
      required: [id, name, maxUsers, maxStructures, price, periodicity]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        maxUsers:
          type: integer
        maxStructures:
          type: integer
        price:
          type: number
        periodicity:
          type: string
          description: "monthly, annual"
        active:
          type: boolean
        createdAt:
          type: string
          format: date-time

    PlanInput:
      type: object
      required: [name, maxUsers, maxStructures, price, periodicity]
      properties:
        name:
          type: string
        description:
          type: string
        maxUsers:
          type: integer
        maxStructures:
          type: integer
        price:
          type: number
        periodicity:
          type: string

    Subscription:
      type: object
      required: [id, companyId, planId, status, startDate]
      properties:
        id:
          type: integer
        companyId:
          type: integer
        planId:
          type: integer
        planName:
          type: string
        planMaxUsers:
          type: ["integer", "null"]
        planMaxStructures:
          type: ["integer", "null"]
        status:
          type: string
          description: "active, overdue, cancelled"
        startDate:
          type: string
          format: date
        nextBillingDate:
          type: ["string", "null"]
          format: date

    SubscriptionInput:
      type: object
      required: [planId]
      properties:
        planId:
          type: integer
